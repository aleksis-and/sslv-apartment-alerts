name: SS.lv apartment monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "7,37 * * * *"

concurrency:
  group: sslv-apartment-alerts
  cancel-in-progress: false

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        run: python monitor.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RUN_FULL_SS_SCAN: "true"
          SS_FULL_SCAN_MAX_PAGES: "20"
          RUN_FOR_USER_API_KEY: ${{ secrets.RUN_FOR_USER_API_KEY }}

      - name: Commit updated seen_ids.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_ids.json
          git diff --cached --quiet || git commit -m "Update seen listings"
          git push --force origin main
